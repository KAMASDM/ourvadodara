<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fafafa;font-family:var(--ov-font-sans);color:#0f172a}
.row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px dashed #eee}
.bar{background:#6366f1;height:14px;border-radius:3px}
.lbl{font-family:var(--ov-font-mono);font-size:11px;color:#64748b;width:80px}
.v{font-family:var(--ov-font-mono);font-size:11px;color:#94a3b8}
</style></head><body>
<div class="row"><span class="lbl">space-1</span><div class="bar" style="width:4px"></div><span class="v">4px</span></div>
<div class="row"><span class="lbl">space-2</span><div class="bar" style="width:8px"></div><span class="v">8px</span></div>
<div class="row"><span class="lbl">space-3</span><div class="bar" style="width:12px"></div><span class="v">12px</span></div>
<div class="row"><span class="lbl">space-4</span><div class="bar" style="width:16px"></div><span class="v">16px · card pad</span></div>
<div class="row"><span class="lbl">space-5</span><div class="bar" style="width:20px"></div><span class="v">20px · card pad lg</span></div>
<div class="row"><span class="lbl">space-6</span><div class="bar" style="width:24px"></div><span class="v">24px · section gap</span></div>
<div class="row"><span class="lbl">space-8</span><div class="bar" style="width:32px"></div><span class="v">32px</span></div>
</body></html>
