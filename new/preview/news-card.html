<!doctype html>
<html><head><meta charset="utf-8"><title>News card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:14px;background:#f8fafc;font-family:var(--ov-font-sans);color:#0f172a}
.card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(15,23,42,.08)}
.media{aspect-ratio:16/9;background:linear-gradient(135deg,#64748b,#334155);position:relative;overflow:hidden}
.media::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.3),transparent 60%)}
.tl{position:absolute;top:10px;left:10px;display:flex;gap:6px}
.pill{padding:4px 10px;border-radius:9999px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.body{padding:14px}
.h{font-size:16px;font-weight:700;line-height:1.3;margin:0 0 6px}
.ex{font-size:13px;color:#64748b;line-height:1.5;margin:0}
.meta{display:flex;gap:10px;font-size:11px;color:#94a3b8;margin-top:10px;align-items:center;border-top:1px solid #f1f5f9;padding-top:10px}
</style></head><body>
<div class="card">
  <div class="media"><div class="tl"><span class="pill" style="background:#7c3aed;color:#fff">Local</span><span class="pill" style="background:linear-gradient(90deg,#f97316,#ef4444);color:#fff">↗ Trending</span></div></div>
  <div class="body">
    <h3 class="h">Vadodara Smart City Project Reaches New Milestone</h3>
    <p class="ex">Phase 1 infrastructure is complete. Residents across the ring-road corridor report smoother commutes.</p>
    <div class="meta"><span>📍 Vadodara</span><span>•</span><span>2h ago</span><span>•</span><span>👁 1.2K</span><span>•</span><span>💬 12</span><span style="margin-left:auto">🔖</span></div>
  </div>
</div>
</body></html>
