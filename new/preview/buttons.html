<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--ov-font-sans)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 0;border-bottom:1px dashed #eee}
.lbl{font-family:var(--ov-font-mono);font-size:10px;color:#94a3b8;width:80px;flex-shrink:0}
.btn{padding:10px 18px;border-radius:9999px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.primary{background:#4f46e5;color:#fff}
.primary:hover{background:#4338ca}
.secondary{background:#f1f5f9;color:#334155}
.ghost{background:transparent;color:#64748b}
.icon{width:36px;height:36px;border-radius:9999px;display:inline-flex;align-items:center;justify-content:center;background:transparent;color:#64748b;border:none;cursor:pointer}
.icon:hover{background:#f1f5f9}
.chip{padding:7px 14px;border-radius:9999px;font-size:12px;font-weight:600;border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer}
.chip.active{background:linear-gradient(90deg,#6366f1,#4f46e5);color:#fff;border-color:#4f46e5;box-shadow:0 4px 10px rgba(79,70,229,.3)}
</style></head><body>
<div class="row"><span class="lbl">primary</span>
  <button class="btn primary">Login</button>
  <button class="btn primary">Done</button>
  <button class="btn primary" style="padding:12px 22px">Complete your profile</button>
</div>
<div class="row"><span class="lbl">secondary</span>
  <button class="btn secondary">Cancel</button>
  <button class="btn secondary">Share</button>
</div>
<div class="row"><span class="lbl">ghost / icon</span>
  <button class="icon">🔔</button>
  <button class="icon">🌐</button>
  <button class="icon">🔖</button>
  <button class="btn ghost">Clear focus</button>
</div>
<div class="row"><span class="lbl">chips</span>
  <button class="chip active">📰 All News</button>
  <button class="chip">🏛️ Politics</button>
  <button class="chip">⚽ Sports</button>
  <button class="chip">🏠 Local</button>
</div>
</body></html>
