<!doctype html>
<html><head><meta charset="utf-8"><title>Reactions</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--ov-font-sans)}
.tray{display:inline-flex;gap:4px;padding:8px 10px;border-radius:9999px;background:#fff;border:1px solid #e2e8f0;box-shadow:0 8px 20px rgba(15,23,42,.1)}
.rx{width:36px;height:36px;border-radius:9999px;display:inline-flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .15s}
.rx:hover{transform:scale(1.3) translateY(-2px);background:#f1f5f9}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin:10px 0 6px}
</style></head><body>
<div class="label">12-reaction picker</div>
<div class="tray">
  <span class="rx" title="Like">👍</span><span class="rx">❤️</span><span class="rx">😂</span><span class="rx">😮</span><span class="rx">😢</span><span class="rx">😡</span><span class="rx">🔥</span><span class="rx">🎉</span><span class="rx">👏</span><span class="rx">🤔</span><span class="rx">🙏</span><span class="rx">😍</span>
</div>
<div class="label">Inline count chip</div>
<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:9999px;background:#f1f5f9;font-size:12px;font-weight:600;color:#475569">❤️ 🔥 👏 · 127</span>
</body></html>
