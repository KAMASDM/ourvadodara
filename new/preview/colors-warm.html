<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Warm</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fafafa;font-family:var(--ov-font-sans);color:var(--ov-fg)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.06);background:#fff}
  .chip{height:56px}
  .meta{padding:8px 10px;font-size:11px;display:flex;justify-content:space-between;align-items:center}
  .nm{font-weight:600}
  .hx{color:var(--ov-fg-muted);font-family:var(--ov-font-mono);font-size:10px}
  .group{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ov-fg-muted);margin:0 0 8px}
</style></head>
<body>
  <p class="group">Ivory · Page wash</p>
  <div class="row" style="margin-bottom:16px">
    <div class="sw"><div class="chip" style="background:#fffef9;border-bottom:1px solid #eee"></div><div class="meta"><span class="nm">ivory 50</span><span class="hx">#fffef9</span></div></div>
    <div class="sw"><div class="chip" style="background:#fff9e6"></div><div class="meta"><span class="nm">ivory 100</span><span class="hx">#fff9e6</span></div></div>
    <div class="sw"><div class="chip" style="background:#fffcf0"></div><div class="meta"><span class="nm">ivory 200</span><span class="hx">#fffcf0</span></div></div>
    <div class="sw"><div class="chip" style="background:#f5e0b3"></div><div class="meta"><span class="nm">ivory 300</span><span class="hx">#f5e0b3</span></div></div>
    <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#fffef9 0%,#fff9e6 50%,#fffcf0 100%)"></div><div class="meta"><span class="nm">ivory grad</span><span class="hx">135°</span></div></div>
  </div>
  <p class="group">Warm Brown · Editorial accent</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#e9dcbb"></div><div class="meta"><span class="nm">200</span><span class="hx">#e9dcbb</span></div></div>
    <div class="sw"><div class="chip" style="background:#d4c189"></div><div class="meta"><span class="nm">300</span><span class="hx">#d4c189</span></div></div>
    <div class="sw"><div class="chip" style="background:#a8926f"></div><div class="meta"><span class="nm">500</span><span class="hx">#a8926f</span></div></div>
    <div class="sw"><div class="chip" style="background:#73624b;color:#fff"></div><div class="meta"><span class="nm">700</span><span class="hx">#73624b</span></div></div>
    <div class="sw"><div class="chip" style="background:#3f352a;color:#fff"></div><div class="meta"><span class="nm">900</span><span class="hx">#3f352a</span></div></div>
  </div>
</body></html>
