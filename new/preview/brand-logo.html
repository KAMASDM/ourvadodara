<!doctype html>
<html><head><meta charset="utf-8"><title>Brand logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fafafa;font-family:var(--ov-font-sans);display:flex;gap:20px;align-items:center}
.tile{position:relative;padding:6px;background:linear-gradient(135deg,#fffef9,#fff9e6);border-radius:12px;border:2px solid #d4c189;box-shadow:0 10px 15px -3px rgba(162,146,111,.15);display:flex;align-items:center;justify-content:center;width:56px;height:56px}
.tile.lg{width:96px;height:96px;padding:10px}
.tile img{width:100%;height:100%;object-fit:contain}
.wordmark{background:#fff;border:1px solid #eee;border-radius:10px;padding:14px 20px}
.wordmark img{height:40px;display:block}
.dark{background:#0f172a;padding:18px;border-radius:10px}
.dark img{height:36px;display:block;filter:brightness(0) invert(1)}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-top:6px;text-align:center}
.col{display:flex;flex-direction:column;align-items:center;gap:4px}
</style></head><body>
<div class="col"><div class="tile"><img src="../assets/our-vadodara-logo.png" alt=""></div><span class="label">Tile · sm</span></div>
<div class="col"><div class="tile lg"><img src="../assets/our-vadodara-logo.png" alt=""></div><span class="label">Tile · lg</span></div>
<div class="col"><div class="wordmark"><img src="../assets/our-vadodara-logo.png" alt=""></div><span class="label">Wordmark</span></div>
<div class="col"><div class="dark"><img src="../assets/our-vadodara-logo.png" alt=""></div><span class="label">On dark</span></div>
</body></html>
