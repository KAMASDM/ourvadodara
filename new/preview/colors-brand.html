<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fafafa;font-family:var(--ov-font-sans);color:var(--ov-fg)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.06);background:#fff}
  .chip{height:56px}
  .meta{padding:8px 10px;font-size:11px;display:flex;justify-content:space-between;align-items:center}
  .nm{font-weight:600;color:var(--ov-fg)}
  .hx{color:var(--ov-fg-muted);font-family:var(--ov-font-mono);font-size:10px}
  .group{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ov-fg-muted);margin:0 0 8px}
</style></head>
<body>
  <p class="group">Primary · Indigo</p>
  <div class="row" style="margin-bottom:16px">
    <div class="sw"><div class="chip" style="background:#eef2ff"></div><div class="meta"><span class="nm">50</span><span class="hx">#eef2ff</span></div></div>
    <div class="sw"><div class="chip" style="background:#c7d2fe"></div><div class="meta"><span class="nm">200</span><span class="hx">#c7d2fe</span></div></div>
    <div class="sw"><div class="chip" style="background:#818cf8"></div><div class="meta"><span class="nm">400</span><span class="hx">#818cf8</span></div></div>
    <div class="sw"><div class="chip" style="background:#6366f1"></div><div class="meta"><span class="nm">500</span><span class="hx">#6366f1</span></div></div>
    <div class="sw"><div class="chip" style="background:#4f46e5;color:#fff"></div><div class="meta"><span class="nm">600 · action</span><span class="hx">#4f46e5</span></div></div>
  </div>
  <p class="group">Accent · Orange · Danger · Red</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#fb923c"></div><div class="meta"><span class="nm">accent 400</span><span class="hx">#fb923c</span></div></div>
    <div class="sw"><div class="chip" style="background:#f97316"></div><div class="meta"><span class="nm">accent 500</span><span class="hx">#f97316</span></div></div>
    <div class="sw"><div class="chip" style="background:#ea580c"></div><div class="meta"><span class="nm">accent 600</span><span class="hx">#ea580c</span></div></div>
    <div class="sw"><div class="chip" style="background:#ef4444"></div><div class="meta"><span class="nm">danger 500</span><span class="hx">#ef4444</span></div></div>
    <div class="sw"><div class="chip" style="background:#dc2626"></div><div class="meta"><span class="nm">danger 600</span><span class="hx">#dc2626</span></div></div>
  </div>
</body></html>
