<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--ov-font-sans)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 0;border-bottom:1px dashed #eee}
.lbl{font-family:var(--ov-font-mono);font-size:10px;color:#94a3b8;width:80px;flex-shrink:0}
.pill{padding:5px 11px;border-radius:9999px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.dot{width:7px;height:7px;border-radius:9999px;display:inline-block}
.meta{display:inline-flex;gap:5px;align-items:center;font-size:12px;color:#64748b;font-weight:500}
</style></head><body>
<div class="row"><span class="lbl">category</span>
  <span class="pill" style="background:#7c3aed;color:#fff">Politics</span>
  <span class="pill" style="background:#ede9fe;color:#6d28d9">Local</span>
  <span class="pill" style="background:#fef3c7;color:#a16207">Sports</span>
</div>
<div class="row"><span class="lbl">status</span>
  <span class="pill" style="background:#ef4444;color:#fff">Live</span>
  <span class="pill" style="background:linear-gradient(90deg,#f97316,#ef4444);color:#fff">↗ Trending</span>
  <span class="pill" style="background:#10b981;color:#fff">Verified</span>
</div>
<div class="row"><span class="lbl">notif</span>
  <span style="position:relative;display:inline-block;width:36px;height:36px;background:#f1f5f9;border-radius:9999px">
    <span style="position:absolute;top:8px;left:11px;font-size:14px">🔔</span>
    <span style="position:absolute;top:6px;right:6px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;border-radius:9999px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;padding:0 3px">9+</span>
  </span>
  <span class="dot" style="background:#ef4444"></span>
  <span class="dot" style="background:#f97316"></span>
  <span class="dot" style="background:#10b981"></span>
</div>
<div class="row"><span class="lbl">meta row</span>
  <span class="meta">👁 1.2K</span>
  <span class="meta">💬 12</span>
  <span class="meta">⏱ 3m</span>
  <span class="meta" style="color:#94a3b8">• 2h ago</span>
</div>
</body></html>
