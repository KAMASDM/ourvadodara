<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Neutral</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fafafa;font-family:var(--ov-font-sans);color:var(--ov-fg)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .sw{border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,.06);background:#fff}
  .chip{height:48px}
  .meta{padding:6px 8px;font-size:10px;display:flex;justify-content:space-between}
  .hx{color:var(--ov-fg-muted);font-family:var(--ov-font-mono);font-size:9px}
  .group{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ov-fg-muted);margin:0 0 8px}
</style></head>
<body>
  <p class="group">Slate · Neutral — full scale</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#f8fafc"></div><div class="meta"><span>50</span><span class="hx">f8fafc</span></div></div>
    <div class="sw"><div class="chip" style="background:#f1f5f9"></div><div class="meta"><span>100</span><span class="hx">f1f5f9</span></div></div>
    <div class="sw"><div class="chip" style="background:#e2e8f0"></div><div class="meta"><span>200</span><span class="hx">e2e8f0</span></div></div>
    <div class="sw"><div class="chip" style="background:#cbd5e1"></div><div class="meta"><span>300</span><span class="hx">cbd5e1</span></div></div>
    <div class="sw"><div class="chip" style="background:#94a3b8"></div><div class="meta"><span>400</span><span class="hx">94a3b8</span></div></div>
    <div class="sw"><div class="chip" style="background:#64748b;color:#fff"></div><div class="meta" style="color:#fff"><span>500</span><span class="hx" style="color:#fff">64748b</span></div></div>
  </div>
  <div class="row" style="margin-top:8px">
    <div class="sw"><div class="chip" style="background:#475569;color:#fff"></div><div class="meta" style="color:#fff"><span>600</span><span class="hx" style="color:#fff">475569</span></div></div>
    <div class="sw"><div class="chip" style="background:#334155;color:#fff"></div><div class="meta" style="color:#fff"><span>700</span><span class="hx" style="color:#fff">334155</span></div></div>
    <div class="sw"><div class="chip" style="background:#1e293b;color:#fff"></div><div class="meta" style="color:#fff"><span>800</span><span class="hx" style="color:#fff">1e293b</span></div></div>
    <div class="sw"><div class="chip" style="background:#0f172a;color:#fff"></div><div class="meta" style="color:#fff"><span>900</span><span class="hx" style="color:#fff">0f172a</span></div></div>
    <div class="sw"><div class="chip" style="background:#020617;color:#fff"></div><div class="meta" style="color:#fff"><span>950</span><span class="hx" style="color:#fff">020617</span></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff;border-bottom:1px solid #eee"></div><div class="meta"><span>white</span><span class="hx">ffffff</span></div></div>
  </div>
</body></html>
